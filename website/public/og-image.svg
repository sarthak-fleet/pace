<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand mark + wordmark -->
  <g transform="translate(72, 80)">
    <g fill="#4f8bff">
      <rect x="0"   y="14" width="12" height="36" rx="6"/>
      <rect x="22"  y="0"  width="12" height="64" rx="6"/>
      <rect x="44"  y="6"  width="12" height="52" rx="6"/>
      <rect x="66"  y="14" width="12" height="36" rx="6"/>
    </g>
    <text x="100" y="48" font-family="Inter, -apple-system, sans-serif" font-weight="700"
          font-size="44" fill="#ffffff" letter-spacing="-1.2">Pace</text>
  </g>

  <!-- Headline (must be readable at 600px thumbnail) -->
  <text x="72" y="260" font-family="Inter, -apple-system, sans-serif" font-weight="700"
        font-size="80" fill="#ffffff" letter-spacing="-2.4">
    <tspan x="72" dy="0">The voice assistant</tspan>
    <tspan x="72" dy="92" fill="#4f8bff">that doesn't phone home.</tspan>
  </text>

  <!-- Subline -->
  <text x="72" y="498" font-family="Inter, -apple-system, sans-serif" font-weight="500"
        font-size="28" fill="#9ca3af">
    <tspan x="72" dy="0">Voice. Screen. Actions. All on your Mac.</tspan>
  </text>

  <!-- Bottom row: price + on-device pill -->
  <g transform="translate(72, 540)">
    <rect width="170" height="46" rx="10" fill="#4f8bff"/>
    <text x="85" y="30" text-anchor="middle"
          font-family="Inter, -apple-system, sans-serif" font-weight="700"
          font-size="20" fill="#ffffff">$29 — Download</text>
  </g>
  <g transform="translate(262, 540)">
    <rect width="260" height="46" rx="10" fill="none" stroke="#2a2d31" stroke-width="1.5"/>
    <circle cx="22" cy="23" r="5" fill="#34d399"/>
    <text x="40" y="30"
          font-family="Inter, -apple-system, sans-serif" font-weight="500"
          font-size="18" fill="#ffffff">100% on-device · macOS 14+</text>
  </g>

  <!-- Decorative voice bars in lower right -->
  <g transform="translate(960, 470)" fill="#4f8bff" opacity="0.85">
    <rect x="0"   y="60" width="20" height="40" rx="10"/>
    <rect x="36"  y="20" width="20" height="120" rx="10"/>
    <rect x="72"  y="40" width="20" height="80" rx="10"/>
    <rect x="108" y="0"  width="20" height="160" rx="10"/>
    <rect x="144" y="30" width="20" height="100" rx="10"/>
  </g>
</svg>
