name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}   # manual trigger — used for the opt-in coverage build

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # macOS app: build + run the Swift Testing / XCTest suite (~1400 tests).
  # Project: leanring-buddy.xcodeproj  |  Scheme: leanring-buddy
  # The app targets macOS 26 (deployment target 26.0), so we select the
  # latest Xcode available on the runner.
  # NOTE: The Test step is a REAL gate. It skips only the handful of tests
  # whose slow part is real hardware wall-clock time (via PACE_CI=1), runs
  # test classes in parallel across the 3 runner cores, and fails if zero
  # tests execute (guards against a silent no-op reporting green).
  # ---------------------------------------------------------------------------
  macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    timeout-minutes: 60
    # Code-coverage instrumentation slows both the build and the test run
    # and nothing gates on it, so it is OFF for push / PR runs and only
    # turned on for a manual (workflow_dispatch) coverage run.
    env:
      ENABLE_COVERAGE: ${{ github.event_name == 'workflow_dispatch' && 'YES' || 'NO' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Pick the newest Xcode installed on the runner.
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${LATEST_XCODE}"
          sudo xcode-select -s "${LATEST_XCODE}"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Xcode version (for cache key)
        id: xcode
        run: echo "id=$(xcodebuild -version | tr '\n .' '---')" >> "$GITHUB_OUTPUT"

      - name: Install Metal Toolchain
        run: |
          # The MLX dependency requires the Metal toolchain, which is
          # not always pre-installed on GitHub Actions macOS runners.
          # Download it explicitly before building.
          xcodebuild -downloadComponent MetalToolchain || true

      # Cache the whole DerivedData — SwiftPM sources AND compiled build
      # products (including mlx-swift's Metal shaders, the slowest thing to
      # compile from scratch). Keyed on Xcode version + Package.resolved so
      # a toolchain or dependency change busts it; github.sha makes each run
      # save a fresh cache, and the restore-keys fall back to the most
      # recent cache so Xcode only incrementally recompiles what changed.
      - name: Cache Xcode DerivedData (SPM + build products)
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-dd-${{ steps.xcode.outputs.id }}-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-dd-${{ steps.xcode.outputs.id }}-${{ hashFiles('**/Package.resolved') }}-
            ${{ runner.os }}-dd-${{ steps.xcode.outputs.id }}-

      - name: Build for testing
        run: |
          set -o pipefail
          if command -v xcpretty &>/dev/null; then
            xcodebuild build-for-testing \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=${{ env.ENABLE_COVERAGE }} \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              2>&1 | xcpretty --color
          else
            echo "xcpretty not found — using raw xcodebuild output"
            xcodebuild build-for-testing \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=${{ env.ENABLE_COVERAGE }} \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          fi

      # This step is a REAL gate — no continue-on-error. Two things make it
      # honest and fast:
      #
      #  1. TEST_RUNNER_PACE_CI=1 (see the env note below) sets PACE_CI=1 in
      #     the test host so `PaceTestEnvironment.isRunningInCI` skips the
      #     handful of tests whose slow part is real elapsed wall-clock time
      #     waiting on hardware that does not exist on a headless runner
      #     (the wake-word spotter's `AVAudioEngine.start()` blocks on the
      #     CoreAudio HAL with no microphone — this alone wedged the step for
      #     30+ minutes before failing; plus a ~48s real Apple Speech /
      #     WhisperKit recognition test). Local runs (scripts/test-pace.sh) do
      #     NOT set this, so they still exercise the full suite.
      #
      #  2. We do NOT pipe through xcpretty. The suite is ~1300 Swift Testing
      #     (`import Testing`) cases; xcpretty only understands the legacy
      #     XCTest console format and silently swallows the entire Swift
      #     Testing stream — which is how a 13s no-op run once showed "green"
      #     with zero tests executed. Instead we pin a result bundle and read
      #     the executed-test count back with `xcresulttool`, then fail the
      #     step if xcodebuild failed OR if zero tests actually ran.
      #
      #  3. `-parallel-testing-enabled YES -parallel-testing-worker-count 3`
      #     matches the 3-core runner so independent test classes run
      #     concurrently.
      - name: Test
        env:
          # xcodebuild runs the tests inside a separate test-host process
          # (Pace.app) that does NOT inherit this shell's environment. The
          # `TEST_RUNNER_` prefix is the supported channel: xcodebuild strips
          # it and injects `PACE_CI=1` into the test host, where
          # `PaceTestEnvironment.isRunningInCI` reads it.
          TEST_RUNNER_PACE_CI: "1"
        run: |
          set -o pipefail
          RESULT_BUNDLE="$RUNNER_TEMP/pace-tests.xcresult"
          rm -rf "$RESULT_BUNDLE"

          set +e
          xcodebuild test-without-building \
            -project leanring-buddy.xcodeproj \
            -scheme leanring-buddy \
            -destination "platform=macOS" \
            -configuration Debug \
            -resultBundlePath "$RESULT_BUNDLE" \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 3 \
            -retry-tests-on-failure \
            -test-iterations 3 \
            CLANG_ENABLE_CODE_COVERAGE=${{ env.ENABLE_COVERAGE }} \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          XCODEBUILD_EXIT=$?
          set -e

          # Guard against the silent no-op: parse the executed-test count from
          # the result bundle and fail if it is missing or zero, even if
          # xcodebuild itself somehow reported success.
          echo "xcodebuild exit code: $XCODEBUILD_EXIT"
          if [ ! -d "$RESULT_BUNDLE" ]; then
            echo "::error::No result bundle at $RESULT_BUNDLE — the Test step ran zero tests."
            exit 1
          fi

          xcrun xcresulttool get test-results summary --path "$RESULT_BUNDLE" > "$RUNNER_TEMP/test-summary.json" 2>/dev/null || true
          EXECUTED=$(python3 -c 'import json; print(int(json.load(open("'"$RUNNER_TEMP"'/test-summary.json")).get("totalTestCount", 0)))' 2>/dev/null || echo 0)
          echo "Executed test count (from result bundle): $EXECUTED"

          if [ "${EXECUTED:-0}" -eq 0 ]; then
            echo "::error::Zero tests executed — treating as a failure (silent no-op guard)."
            exit 1
          fi

          if [ "$XCODEBUILD_EXIT" -ne 0 ]; then
            echo "::error::xcodebuild reported test failures (exit $XCODEBUILD_EXIT)."
            exit "$XCODEBUILD_EXIT"
          fi

          echo "✅ $EXECUTED tests executed and passed."

      - name: Extract coverage
        if: env.ENABLE_COVERAGE == 'YES'
        run: |
          # Prefer the result bundle the Test step pinned; fall back to the
          # DerivedData scan for older layouts.
          XCRESULT="$RUNNER_TEMP/pace-tests.xcresult"
          if [ ! -d "$XCRESULT" ]; then
            XCRESULT=$(find ~/Library/Developer/Xcode/DerivedData -name '*.xcresult' -type d | head -1)
          fi
          if [ -n "$XCRESULT" ]; then
            xcrun xccov view --report --json "$XCRESULT" > coverage-report.json || true
            # Print summary
            python3 -c "
          import json
          with open('coverage-report.json') as f:
              data = json.load(f)
              for target in data.get('targets', []):
                  name = target.get('name', 'unknown')
                  line_cov = target.get('lineCoverage', 0) * 100
                  print(f'{name}: {line_cov:.1f}% line coverage')
          " || true
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: env.ENABLE_COVERAGE == 'YES'
        with:
          name: coverage-report
          path: coverage-report.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Website: Astro static site in ./website.
  # Separate job so a website failure doesn't mask app-test results and
  # vice-versa. Runs on a cheap Ubuntu runner.
  # ---------------------------------------------------------------------------
  website:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
