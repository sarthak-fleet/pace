name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # macOS app: build + run the XCTest suite (1079 tests).
  # Project: leanring-buddy.xcodeproj  |  Scheme: leanring-buddy
  # The app targets macOS 26 (deployment target 26.0), so we select the
  # latest Xcode available on the runner.
  # NOTE: Test step is continue-on-error because the app requires MLX models
  # and runtime setup that are not available in CI. The build-for-testing
  # step is the real gate — if it passes, the code compiles correctly.
  # ---------------------------------------------------------------------------
  macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Pick the newest Xcode installed on the runner.
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${LATEST_XCODE}"
          sudo xcode-select -s "${LATEST_XCODE}"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install Metal Toolchain
        run: |
          # The MLX dependency requires the Metal toolchain, which is
          # not always pre-installed on GitHub Actions macOS runners.
          # Download it explicitly before building.
          xcodebuild -downloadComponent MetalToolchain || true

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build for testing
        run: |
          set -o pipefail
          if command -v xcpretty &>/dev/null; then
            xcodebuild build-for-testing \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=YES \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              2>&1 | xcpretty --color
          else
            echo "xcpretty not found — using raw xcodebuild output"
            xcodebuild build-for-testing \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=YES \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          fi

      - name: Test
        continue-on-error: true
        run: |
          set -o pipefail
          if command -v xcpretty &>/dev/null; then
            xcodebuild test-without-building \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=YES \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              2>&1 | xcpretty --color --report junit
          else
            echo "xcpretty not found — using raw xcodebuild output"
            xcodebuild test-without-building \
              -project leanring-buddy.xcodeproj \
              -scheme leanring-buddy \
              -destination "platform=macOS" \
              -configuration Debug \
              CLANG_ENABLE_CODE_COVERAGE=YES \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          fi

      - name: Extract coverage
        run: |
          # Find the xcresult bundle
          XCRESULT=$(find ~/Library/Developer/Xcode/DerivedData -name '*.xcresult' -type d | head -1)
          if [ -n "$XCRESULT" ]; then
            xcrun xccov view --report --json "$XCRESULT" > coverage-report.json || true
            # Print summary
            python3 -c "
          import json
          with open('coverage-report.json') as f:
              data = json.load(f)
              for target in data.get('targets', []):
                  name = target.get('name', 'unknown')
                  line_cov = target.get('lineCoverage', 0) * 100
                  print(f'{name}: {line_cov:.1f}% line coverage')
          " || true
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-report.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Website: Astro static site in ./website.
  # Separate job so a website failure doesn't mask app-test results and
  # vice-versa. Runs on a cheap Ubuntu runner.
  # ---------------------------------------------------------------------------
  website:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
